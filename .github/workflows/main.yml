name: Build Android APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with: { java-version: '11', distribution: 'temurin' }
    - uses: gradle/actions/setup-gradle@v4
      with: { gradle-version: 8.4 }
    - run: |
        sed -i '/tasks.withType(Javadoc)/,/^}/d' app/build.gradle
        sed -i "s/implementation project(':opensdk')//g" app/build.gradle
        sed -i "s/include ':opensdk'//g" settings.gradle
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    - uses: actions/upload-artifact@v4
      with: { name: Virtual-Galaxy-APK, path: app/build/outputs/apk/debug/app-debug.apk }
